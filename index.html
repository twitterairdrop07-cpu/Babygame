<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมส์เล่นแก้ง่วง - กระดานออฟไลน์ ห้ามเล่นพนันนะ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 750px; margin: 0 auto; background: #1a252f; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 4px solid #f1c40f; }
        
        /* ส่วนแสดงผลการเขย่าลูกเต๋า */
        .dice-display-zone { background: #34495e; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 2px dashed #bdc3c7; }
        .dice-container { display: flex; justify-content: center; gap: 25px; margin-top: 15px; }
        
        /* ลูกเต๋า */
        .dice-cup { width: 85px; height: 85px; background: #e74c3c; color: white; font-size: 50px; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.4); font-weight: bold; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .dice-cup img { width: 100%; height: 100%; object-fit: cover; }
        
        /* แผงแสดงสัญลักษณ์ตรงกลาง */
        .betting-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        
        /* สไตล์ช่องปกติ */
        .board-cell { 
            background: #f39c12; color: #111; padding: 25px 15px; border-radius: 12px; font-weight: bold; font-size: 24px; border: 1px solid #d35400; box-shadow: 0 6px 0 #d35400; 
            position: relative; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px;
        }
        .cell-emoji { font-size: 55px; display: block; margin-bottom: 8px; line-height: 1; }
        
        /* รูปภาพเสือ บนกระดาน */
        .cell-image { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #111; }

        /* สไตล์เมื่อช่องนั้นถูกรางวัล (ไฮไลท์สว่างวาบ) */
        .board-cell.highlight {
            background: #2ecc71 !important;
            color: #fff !important;
            border-color: #27ae60 !important;
            box-shadow: 0 6px 0 #27ae60, 0 0 20px #2ecc71;
            transform: translateY(-2px);
        }

        /* ป้ายแสดงตัวคูณกรณีออกซ้ำ (X2, X3) */
        .multiplier-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            font-size: 20px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 900;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 2px solid white;
            display: none;
            z-index: 10;
            animation: bounce 0.4s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* ปุ่มควบคุมหลัก */
        .action-btn { background: #2ecc71; color: white; border: none; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 6px 0 #27ae60; width: 100%; box-sizing: border-box; }
        .action-btn:hover { background: #27ae60; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #27ae60; }
        .action-btn:disabled { background: #7f8c8d; box-shadow: none; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>🎲 กระดานน้ำเต้าปูปลา</h2>
    <p style="color: #bdc3c7; margin-top: -10px;">เลือกครบกันแล้ว แล้วกดเขย่าลุ้นพร้อมกันได้เลย!</p>

    <!-- ส่วนถ้วยเขย่าลูกเต๋า -->
    <div class="dice-display-zone">
        <div id="gamePhaseText" style="font-weight: bold; font-size: 20px; color: #f1c40f;">ยินดีต้อนรับนะจ๊ะ!</div>
        <div class="dice-container">
            <div class="dice-cup" id="dice1">❓</div>
            <div class="dice-cup" id="dice2">❓</div>
            <div class="dice-cup" id="dice3">❓</div>
        </div>
    </div>

    <!-- แผงแสดงสัญลักษณ์ตรงกลาง -->
    <div class="betting-board">
        <!-- ช่องน้ำเต้า -->
        <div class="board-cell" id="cell-gourd">
            <div class="multiplier-badge" id="badge-gourd">X2</div>
            <span class="cell-emoji">🏺</span> น้ำเต้า
        </div>
        <!-- ช่องปู -->
        <div class="board-cell" id="cell-crab">
            <div class="multiplier-badge" id="badge-crab">X2</div>
            <span class="cell-emoji">🦀</span> ปู
        </div>
        <!-- ช่องปลา -->
        <div class="board-cell" id="cell-fish">
            <div class="multiplier-badge" id="badge-fish">X2</div>
            <span class="cell-emoji">🐟</span> ปลา
        </div>
        <!-- ช่องเสือ (ใช้รูปภาพ Custom) -->
        <div class="board-cell" id="cell-tiger">
            <div class="multiplier-badge" id="badge-tiger">X2</div>
            <img src="102260_2.jpg" class="cell-image" alt="เสือ">
            เสือ
        </div>
        <!-- ช่องไก่ -->
        <div class="board-cell" id="cell-chicken">
            <div class="multiplier-badge" id="badge-chicken">X2</div>
            <span class="cell-emoji">🐔</span> ไก่
        </div>
        <!-- ช่องกุ้ง -->
        <div class="board-cell" id="cell-shrimp">
            <div class="multiplier-badge" id="badge-shrimp">X2</div>
            <span class="cell-emoji">🦐</span> กุ้ง
        </div>
    </div>

    <!-- ปุ่มกดเปิดถ้วยเขย่า -->
    <button class="action-btn" id="btnMain" onclick="rollDice()">🎰 เริ่มเขย่าลูกเต๋า!</button>
</div>

<script>
    // ข้อมูลสัญลักษณ์
    const ITEMS = {
        gourd:   { name: "น้ำเต้า", emoji: "🏺", isImage: false },
        crab:    { name: "ปู",     emoji: "🦀", isImage: false },
        fish:    { name: "ปลา",    emoji: "🐟", isImage: false },
        tiger:   { name: "เสือ",    emoji: "102260_2.jpg", isImage: true },
        chicken: { name: "ไก่",    emoji: "🐔", isImage: false },
        shrimp:  { name: "กุ้ง",    emoji: "🦐", isImage: false }
    };
    const ITEM_KEYS = Object.keys(ITEMS);
    let isRolling = false;

    // ฟังก์ชันจัดการดึงเนื้อหาไปแปะบนลูกเต๋า (รองรับทั้งอีโมจิและรูปภาพ)
    function setDiceContent(diceId, itemKey) {
        let diceElement = document.getElementById(diceId);
        let item = ITEMS[itemKey];
        if (item.isImage) {
            diceElement.innerHTML = `<img src="${item.emoji}" alt="เสือ">`;
        } else {
            diceElement.innerHTML = item.emoji;
        }
    }

    function resetBoardVisuals() {
        ITEM_KEYS.forEach(key => {
            document.getElementById(`cell-${key}`).classList.remove('highlight');
            let badge = document.getElementById(`badge-${key}`);
            badge.style.display = "none";
            badge.innerText = "";
        });
    }

    function rollDice() {
        if (isRolling) return;

        isRolling = true;
        document.getElementById("btnMain").disabled = true;
        document.getElementById("gamePhaseText").innerText = "กำลังเขย่าถ้วย... ลุ้นระทึกกันให้ดี! 🎲";
        
        resetBoardVisuals();

        let rollCount = 0;
        let interval = setInterval(() => {
            setDiceContent("dice1", ITEM_KEYS[Math.floor(Math.random() * 6)]);
            setDiceContent("dice2", ITEM_KEYS[Math.floor(Math.random() * 6)]);
            setDiceContent("dice3", ITEM_KEYS[Math.floor(Math.random() * 6)]);
            rollCount++;
            
            if (rollCount > 15) {
                clearInterval(interval);
                finalizeResults();
            }
        }, 80);
    }

    function finalizeResults() {
        let result1 = ITEM_KEYS[Math.floor(Math.random() * 6)];
        let result2 = ITEM_KEYS[Math.floor(Math.random() * 6)];
        let result3 = ITEM_KEYS[Math.floor(Math.random() * 6)];

        let finalDices = [result1, result2, result3];

        // แสดงสัญลักษณ์จริงที่สุ่มได้บนลูกเต๋า
        setDiceContent("dice1", result1);
        setDiceContent("dice2", result2);
        setDiceContent("dice3", result3);

        // นับจำนวนที่ออกซ้ำ
        let counts = {};
        finalDices.forEach(d => counts[d] = (counts[d] || 0) + 1);

        // ทำไฮไลท์ตัวที่ถูกรางวัล
        for (let key in counts) {
            let cell = document.getElementById(`cell-${key}`);
            cell.classList.add('highlight');

            if (counts[key] > 1) {
                let badge = document.getElementById(`badge-${key}`);
                badge.innerText = `X${counts[key]}`;
                badge.style.display = "block";
            }
        }

        // ข้อความสรุปผลด้านบน
        let textResults = finalDices.map(d => {
            return ITEMS[d].name + (counts[d] > 1 ? ` (X${counts[d]})` : '');
        });
        let uniqueTextResults = [...new Set(textResults)].join(" - ");
        
        document.getElementById("gamePhaseText").innerText = `ผลที่ออก: 🎉 ${uniqueTextResults} 🎉`;

        isRolling = false;
        document.getElementById("btnMain").disabled = false;
        document.getElementById("btnMain").innerText = "🎰 เขย่าตาถัดไป!";
    }
</script>
</body>
</html>
