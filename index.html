<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>น้ำเต้าปูปลา - ระบบเสียง AI เว้นจังหวะ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 750px; margin: 0 auto; background: #1a252f; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 4px solid #f1c40f; }
        .dice-display-zone { background: #34495e; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 2px dashed #bdc3c7; }
        .dice-container { display: flex; justify-content: center; gap: 25px; margin-top: 15px; }
        .dice-cup { width: 85px; height: 85px; background: #e74c3c; color: white; font-size: 50px; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.4); font-weight: bold; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .dice-cup img { width: 100%; height: 100%; object-fit: cover; }
        .betting-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .board-cell { background: #f39c12; color: #111; padding: 25px 15px; border-radius: 12px; font-weight: bold; font-size: 24px; border: 1px solid #d35400; box-shadow: 0 6px 0 #d35400; position: relative; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; }
        .cell-emoji { font-size: 55px; display: block; margin-bottom: 8px; line-height: 1; }
        .cell-image { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #111; }
        .board-cell.highlight { background: #2ecc71 !important; color: #fff !important; border-color: #27ae60 !important; box-shadow: 0 6px 0 #27ae60, 0 0 20px #2ecc71; transform: translateY(-2px); }
        .multiplier-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; font-size: 20px; padding: 4px 10px; border-radius: 8px; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 2px solid white; display: none; z-index: 10; }
        .action-btn { background: #2ecc71; color: white; border: none; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 6px 0 #27ae60; width: 100%; }
        .action-btn:disabled { background: #7f8c8d; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>🎲 กระดานน้ำเต้าปูปลา</h2>
    <div class="dice-display-zone">
        <div id="gamePhaseText" style="font-weight: bold; font-size: 20px; color: #f1c40f;">กดเริ่มเขย่าเลย!</div>
        <div class="dice-container">
            <div class="dice-cup" id="dice1">❓</div>
            <div class="dice-cup" id="dice2">❓</div>
            <div class="dice-cup" id="dice3">❓</div>
        </div>
    </div>

    <div class="betting-board">
        <div class="board-cell" id="cell-gourd"><div class="multiplier-badge" id="badge-gourd">X2</div><span class="cell-emoji">🏺</span> น้ำเต้า</div>
        <div class="board-cell" id="cell-crab"><div class="multiplier-badge" id="badge-crab">X2</div><span class="cell-emoji">🦀</span> ปู</div>
        <div class="board-cell" id="cell-fish"><div class="multiplier-badge" id="badge-fish">X2</div><span class="cell-emoji">🐟</span> ปลา</div>
        <div class="board-cell" id="cell-tiger"><div class="multiplier-badge" id="badge-tiger">X2</div><img src="102260_2.jpg" class="cell-image"> เสือ</div>
        <div class="board-cell" id="cell-chicken"><div class="multiplier-badge" id="badge-chicken">X2</div><span class="cell-emoji">🐔</span> ไก่</div>
        <div class="board-cell" id="cell-shrimp"><div class="multiplier-badge" id="badge-shrimp">X2</div><span class="cell-emoji">🦐</span> กุ้ง</div>
    </div>

    <button class="action-btn" id="btnMain" onclick="rollDice()">🎰 เริ่มเขย่าลูกเต๋า!</button>
</div>

<script>
    const ITEMS = {
        gourd: {name:"น้าว ต้าว", emoji:"🏺", isImage:false}, crab: {name:"ปู", emoji:"🦀", isImage:false},
        fish: {name:"ปลา", emoji:"🐟", isImage:false}, tiger: {name:"เสือ บี้หมู", emoji:"102260_2.jpg", isImage:true},
        chicken: {name:"ไก่", emoji:"🐔", isImage:false}, shrimp: {name:"กุ้ง", emoji:"🦐", isImage:false}
    };
    const ITEM_KEYS = Object.keys(ITEMS);
    let isRolling = false;

    function setDiceContent(diceId, key) {
        let el = document.getElementById(diceId);
        el.innerHTML = ITEMS[key].isImage ? `<img src="${ITEMS[key].emoji}">` : ITEMS[key].emoji;
    }

    async function speakResults(results) {
        for (let key of results) {
            let msg = new SpeechSynthesisUtterance(ITEMS[key].name);
            msg.lang = 'th-TH';
            window.speechSynthesis.speak(msg);
            await new Promise(r => setTimeout(r, 300));
        }
    }

    async function rollDice() {
        if (isRolling) return;
        isRolling = true;
        document.getElementById("btnMain").disabled = true;
        
        // ล้างสถานะเดิม
        ITEM_KEYS.forEach(k => {
            document.getElementById(`cell-${k}`).classList.remove('highlight');
            document.getElementById(`badge-${k}`).style.display = "none";
        });

        let rollCount = 0;
        let timer = setInterval(() => {
            setDiceContent("dice1", ITEM_KEYS[Math.floor(Math.random()*6)]);
            setDiceContent("dice2", ITEM_KEYS[Math.floor(Math.random()*6)]);
            setDiceContent("dice3", ITEM_KEYS[Math.floor(Math.random()*6)]);
            rollCount++;
            if(rollCount > 10) {
                clearInterval(timer);
                let final = [ITEM_KEYS[Math.floor(Math.random()*6)], ITEM_KEYS[Math.floor(Math.random()*6)], ITEM_KEYS[Math.floor(Math.random()*6)]];
                
                final.forEach((k, i) => setDiceContent(`dice${i+1}`, k));
                
                let counts = {};
                final.forEach(k => {
                    counts[k] = (counts[k]||0)+1;
                    document.getElementById(`cell-${k}`).classList.add('highlight');
                    if(counts[k]>1) {
                        let b = document.getElementById(`badge-${k}`);
                        b.innerText = "X"+counts[k];
                        b.style.display = "block";
                    }
                });

                document.getElementById("gamePhaseText").innerText = "เฉลยผล:";
                speakResults(final).then(() => {
                    isRolling = false;
                    document.getElementById("btnMain").disabled = false;
                });
            }
        }, 80);
    }
</script>
</body>
</html>
